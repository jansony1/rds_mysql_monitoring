apiVersion: v1alpha1

discovery:
  exportedTagsOnMetrics:
    AWS/RDS:
      - Name
      - DBInstanceIdentifier

  jobs:
    - type: AWS/RDS
      regions:
        - us-east-1
      period: 60
      length: 120
      delay: 120
      metrics:
        # 仅 3 项 OS 级指标 (mysqld_exporter 无法获取)
        - name: CPUUtilization
          statistics: [Average, Maximum]
        - name: FreeableMemory
          statistics: [Average]
        - name: FreeStorageSpace
          statistics: [Average]
