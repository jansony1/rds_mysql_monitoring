version: "3.8"

services:
  # YACE - 主力采集器: 18 项指标 (PI 发布到 CloudWatch 的 counter + OS 标准指标)
  yace:
    image: ghcr.io/nerdswords/yet-another-cloudwatch-exporter:v0.62.0
    container_name: yace
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./yace-config.yaml:/tmp/config.yml:ro
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command:
      - --config.file=/tmp/config.yml
      - --listen-address=:5000
      - --scraping-interval=60

  # mysqld_exporter - 补齐 CloudWatch 缺失的 5 项: TPS, fsync, 复制状态
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: mysqld-exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    volumes:
      - ./mysqld-exporter.cnf:/etc/.mysqld_exporter.cnf:ro
      - ./global-bundle.pem:/etc/ssl/certs/global-bundle.pem:ro
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_EXPORTER_PASSWORD}
    command:
      - --config.my-cnf=/etc/.mysqld_exporter.cnf
      - --no-collect.info_schema.query_response_time  # Percona 专有, RDS 报错
      - --collect.global_status                # Handler_commit/rollback (TPS), Innodb_data_fsyncs
      - --collect.global_variables             # max_connections 等
      - --collect.slave_status                 # 复制状态 (仅只读副本有数据)
      - --exporter.lock_wait_timeout=2

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    depends_on:
      - yace
      - mysqld-exporter

volumes:
  prometheus-data:
